name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build and Sign APK
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
        unzip -q gradle-8.1.1-bin.zip
        export PATH=$PWD/gradle-8.1.1/bin:$PATH

        keytool -genkey -v \
          -keystore familyschool.jks \
          -alias familyschool \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass familyschool123 \
          -keypass familyschool123 \
          -dname "CN=Family School, OU=App, O=FamilySchool, L=Florida, ST=FL, C=US"

        gradle assembleRelease

        BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
        echo "Using build-tools: $BUILD_TOOLS"

        # 1. Zipalign PRIMEIRO
        $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -f -v 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          app/build/outputs/apk/release/app-aligned.apk

        # 2. Assinar DEPOIS do zipalign
        $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
          --ks familyschool.jks \
          --ks-pass pass:familyschool123 \
          --key-pass pass:familyschool123 \
          --ks-key-alias familyschool \
          --out app/build/outputs/apk/release/family-school.apk \
          app/build/outputs/apk/release/app-aligned.apk

        echo "APK assinado com sucesso!"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: family-school-app
        path: app/build/outputs/apk/release/family-school.apk
